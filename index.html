<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RainbowGraphicDesign</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;margin:0;background:linear-gradient(135deg,#667eea,#764ba2);color:white;text-align:center;}
header{padding:20px;font-size:24px;font-weight:700;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px;}
.card{background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);padding:25px;border-radius:15px;cursor:pointer;transition:0.3s;}
.card:hover{transform:scale(1.05);}
.section{display:none;padding:20px;}
canvas{background:white;margin-top:15px;max-width:100%;border-radius:10px;}
input,select{padding:8px;margin:5px;border-radius:5px;border:none;}
button{padding:10px 20px;border:none;border-radius:6px;background:#ff7b00;color:white;cursor:pointer;margin:10px;}
footer{margin-top:40px;padding:20px;background:rgba(0,0,0,0.3);}
.counter{font-size:12px;opacity:0.8;margin-top:5px;}
</style>
</head>
<body>
<header>🌈 RainbowGraphicDesign</header>

<div class="container">

<!-- New Eid Poster Generator Card -->
<div class="card" onclick="openTool('eid')">
Eid Poster Generator
<div class="counter" id="countEid"></div>
</div>

<div class="card" onclick="openTool('photo')">
Photo Card Generator
<div class="counter" id="countPhoto"></div>
</div>
<div class="card" onclick="openTool('news')">
News Card Maker
<div class="counter" id="countNews"></div>
</div>
<div class="card" onclick="openTool('poster')">
Poster Maker
<div class="counter" id="countPoster"></div>
</div>
<div class="card" onclick="openTool('frame')">
Frame Generator
<div class="counter" id="countFrame"></div>
</div>
<div class="card" onclick="openTool('coming')">
Coming Soon
</div>
</div>

<!-- TOOL AREA -->
<div id="toolArea" class="section">
<h2 id="toolTitle"></h2>
<input type="file" id="imageInput">
<input type="file" id="logoInput"><br>
<input type="text" id="textInput" placeholder="Enter Text">
<select id="fontSelect">
<option value="30px Arial">Arial</option>
<option value="30px Poppins">Poppins</option>
<option value="30px Georgia">Georgia</option>
</select>
<input type="color" id="colorPicker" value="#ffffff"><br>
<button onclick="generate()">Generate</button>
<button onclick="download()">Download HD</button>
<button onclick="goHome()">Back</button>
<br><canvas id="canvas" width="1080" height="1080"></canvas>
</div>

<!-- Eid Poster Tool -->
<div id="toolAreaEid" class="section">
<h2>Eid Poster Generator</h2>
<input type="file" id="eidImageInput" accept="image/*"><br>
<input type="text" id="eidNameInput" placeholder="Enter Name"><br>
<input type="text" id="eidDesignationInput" placeholder="Enter Designation"><br>
<button onclick="generateEidPoster()">Generate</button>
<button onclick="downloadEidPoster()">Download HD JPEG</button>
<button onclick="goHome()">Back</button>
<br><canvas id="eidCanvas" width="1080" height="1080"></canvas>
</div>

<div id="coming" class="section">
<h2>🚀 Coming Soon</h2>
<p>More tools will be added in future.</p>
<button onclick="goHome()">Back</button>
</div>

<footer>
<p>RainbowGraphicDesign © 2026</p>
<p>Email: rainbowgraphic@email.com</p>
<p>All Rights Reserved</p>
</footer>

<script>
// Counters
let currentTool="";
const counters={
eid:localStorage.getItem('eid')||0,
photo:localStorage.getItem('photo')||0,
news:localStorage.getItem('news')||0,
poster:localStorage.getItem('poster')||0,
frame:localStorage.getItem('frame')||0
};
function updateCounters(){
countEid.innerText="Used "+counters.eid+" times";
countPhoto.innerText="Used "+counters.photo+" times";
countNews.innerText="Used "+counters.news+" times";
countPoster.innerText="Used "+counters.poster+" times";
countFrame.innerText="Used "+counters.frame+" times";
}
updateCounters();

// Open Tool
function openTool(tool){
document.querySelectorAll('.section').forEach(sec=>sec.style.display='none');
if(tool==='coming'){document.getElementById('coming').style.display='block';return;}
if(tool==='eid'){document.getElementById('toolAreaEid').style.display='block';currentTool='eid';return;}
currentTool=tool;
document.getElementById('toolArea').style.display='block';
document.getElementById('toolTitle').innerText=tool.toUpperCase()+" Generator";
}

// Go Home
function goHome(){document.querySelectorAll('.section').forEach(sec=>sec.style.display='none');}

// Photo/Other Generators
function generate(){
const canvas=document.getElementById("canvas");const ctx=canvas.getContext("2d");
const imgFile=imageInput.files[0];const logoFile=logoInput.files[0];const text=textInput.value;const font=fontSelect.value;const color=colorPicker.value;
if(!imgFile){alert("Please upload an image");return;}
const img=new Image();
img.onload=function(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0,1080,1080);ctx.fillStyle=color;ctx.font=font;ctx.fillText(text,100,1000);
if(logoFile){const logo=new Image();logo.onload=function(){ctx.drawImage(logo,850,50,180,180);};logo.src=URL.createObjectURL(logoFile);}
};
img.src=URL.createObjectURL(imgFile);
counters[currentTool]++;localStorage.setItem(currentTool,counters[currentTool]);updateCounters();
}
function download(){const canvas=document.getElementById("canvas");const link=document.createElement("a");link.download="RainbowDesign.png";link.href=canvas.toDataURL();link.click();}

// ✅ Eid Poster Generator
const REMOVE_BG_API_KEY = "YOUR_API_KEY_HERE"; // <-- set your remove.bg API key
async function generateEidPoster(){
const canvas=document.getElementById("eidCanvas");const ctx=canvas.getContext("2d");
// background
const bg=new Image();bg.src="eid_poster_background.png";await bg.decode();ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(bg,0,0,1080,1080);
// user image
const file=document.getElementById("eidImageInput").files[0];if(file){
const userImg=await removeBgAPI(file);await userImg.decode();ctx.drawImage(userImg,350,150,380,380);}
const name=document.getElementById("eidNameInput").value;ctx.fillStyle="#ffffff";ctx.font="bold 50px Poppins";ctx.fillText(name,540-ctx.measureText(name).width/2,600);
const desig=document.getElementById("eidDesignationInput").value;ctx.fillStyle="#ffffff";ctx.font="40px Poppins";ctx.fillText(desig,540-ctx.measureText(desig).width/2,660);
counters.eid++;localStorage.setItem('eid',counters.eid);updateCounters();
}
function downloadEidPoster(){const canvas=document.getElementById("eidCanvas");const link=document.createElement("a");link.download="EidPoster.jpg";link.href=canvas.toDataURL("image/jpeg",1.0);link.click();}
async function removeBgAPI(file){
const formData=new FormData();formData.append("image_file",file);formData.append("size","auto");
const response=await fetch("https://api.remove.bg/v1.0/removebg",{method:"POST",headers:{"X-Api-Key":REMOVE_BG_API_KEY},body:formData});
const blob=await response.blob();return new Promise(resolve=>{const img=new Image();img.onload=()=>resolve(img);img.src=URL.createObjectURL(blob);});
}
</script>
</body>
</html>
