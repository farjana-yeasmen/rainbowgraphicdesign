<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poster Maker Pro - Rainbow Graphic Design</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f1f3f7;
}

.container{
  display:flex;
  height:100vh;
}

.controls{
  width:30%;
  background:#fff;
  padding:20px;
  overflow-y:auto;
  box-shadow:0 0 15px rgba(0,0,0,0.05);
}

.controls h2{
  margin-top:0;
}

.controls button, .controls input, .controls select{
  width:100%;
  margin-top:10px;
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

.controls button{
  background:#667eea;
  color:white;
  font-weight:bold;
  cursor:pointer;
  border:none;
}

.preview-wrapper{
  width:70%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.poster{
  width:600px;
  height:600px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  position:relative;
  border-radius:12px;
  overflow:hidden;
}

.draggable{
  position:absolute;
  cursor:move;
}

.shape{
  width:100px;
  height:100px;
  background:white;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  pointer-events:none;
}

</style>
</head>

<body>

<div class="container">

<div class="controls">
<h2>Poster Maker Pro</h2>

<button onclick="addText()">Add Text</button>
<button onclick="addShape()">Add Shape</button>
<button onclick="addSticker()">Add Sticker</button>

<input type="file" id="imageUpload">

<select onchange="changeGradient(this.value)">
<option value="linear-gradient(135deg,#667eea,#764ba2)">Purple Blue</option>
<option value="linear-gradient(135deg,#ff9966,#ff5e62)">Orange Pink</option>
<option value="linear-gradient(135deg,#0f2027,#2c5364)">Dark Cyan</option>
<option value="linear-gradient(135deg,#000000,#b8860b)">Black Gold</option>
</select>

<input type="color" onchange="setOverlay(this.value)">
<button onclick="removeOverlay()">Remove Overlay</button>

<button onclick="downloadPoster()">Download PNG</button>
<button onclick="resetPoster()">Reset</button>

</div>

<div class="preview-wrapper">
<div class="poster" id="poster">
<div class="overlay" id="overlay"></div>
</div>
</div>

</div>

<script>
const poster = document.getElementById("poster");
const overlay = document.getElementById("overlay");

function makeDraggable(el){
  let offsetX=0, offsetY=0, isDown=false;

  el.addEventListener("mousedown", function(e){
    isDown=true;
    offsetX=e.offsetX;
    offsetY=e.offsetY;
  });

  document.addEventListener("mousemove", function(e){
    if(!isDown) return;
    const rect = poster.getBoundingClientRect();
    el.style.left = (e.clientX - rect.left - offsetX) + "px";
    el.style.top = (e.clientY - rect.top - offsetY) + "px";
  });

  document.addEventListener("mouseup", function(){
    isDown=false;
  });
}

function addText(){
  const text = document.createElement("div");
  text.className="draggable";
  text.contentEditable=true;
  text.innerText="Edit Text";
  text.style.color="white";
  text.style.fontSize="24px";
  text.style.top="50px";
  text.style.left="50px";
  poster.appendChild(text);
  makeDraggable(text);
}

function addShape(){
  const shape = document.createElement("div");
  shape.className="draggable shape";
  shape.style.top="100px";
  shape.style.left="100px";
  poster.appendChild(shape);
  makeDraggable(shape);
}

function addSticker(){
  const sticker = document.createElement("div");
  sticker.className="draggable";
  sticker.innerText="🔥";
  sticker.style.fontSize="60px";
  sticker.style.top="150px";
  sticker.style.left="150px";
  poster.appendChild(sticker);
  makeDraggable(sticker);
}

document.getElementById("imageUpload").addEventListener("change", function(){
  const reader = new FileReader();
  reader.onload=function(e){
    const img = document.createElement("img");
    img.src=e.target.result;
    img.className="draggable";
    img.style.width="200px";
    img.style.top="200px";
    img.style.left="200px";
    poster.appendChild(img);
    makeDraggable(img);
  }
  reader.readAsDataURL(this.files[0]);
});

function changeGradient(value){
  poster.style.background=value;
}

function setOverlay(color){
  overlay.style.background=color;
  overlay.style.opacity="0.3";
}

function removeOverlay(){
  overlay.style.background="transparent";
}

function downloadPoster(){
  html2canvas(poster).then(canvas=>{
    const link=document.createElement("a");
    link.download="poster-pro.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

function resetPoster(){
  poster.innerHTML='<div class="overlay" id="overlay"></div>';
}
</script>

</body>
</html>
