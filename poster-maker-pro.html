<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poster Maker Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f4f6fb;
padding:20px;
text-align:center;
}

h1{
margin-bottom:20px;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-bottom:20px;
}

.controls input,
.controls select{
padding:8px;
border-radius:6px;
border:1px solid #ddd;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.poster{
width:900px;
max-width:95%;
height:500px;
margin:auto;
position:relative;
border-radius:16px;
overflow:hidden;
display:flex;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
}

.poster.reverse{
flex-direction:row-reverse;
}

.bg-circle{
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,rgba(0,0,0,0.4),transparent);
border-radius:50%;
left:-200px;
top:-150px;
}

.text-area{
flex:1;
padding:40px;
text-align:left;
display:flex;
flex-direction:column;
justify-content:center;
z-index:2;
}

.headline{
font-size:44px;
font-weight:700;
line-height:1.1;
}

.desc{
margin-top:15px;
opacity:0.85;
}

.quote{
margin-top:10px;
font-style:italic;
color:#93c5fd;
}

.model{
flex:1;
display:flex;
align-items:end;
justify-content:center;
z-index:2;
}

.model img{
max-height:90%;
}

.bottom-overlay{
position:absolute;
bottom:0;
width:100%;
height:40%;
background:linear-gradient(to top,#0f172a,transparent);
}

.logo{
position:absolute;
top:20px;
left:20px;
}

.logo img{
height:40px;
}

.footer{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 40px;
z-index:3;
}

.cta{
background:#3b82f6;
padding:12px 26px;
border-radius:30px;
font-weight:600;
}

.contact{
text-align:right;
}

</style>
</head>

<body>

<h1>Poster Maker Pro</h1>

<div class="controls">

<input type="file" id="logoUpload">
<input type="file" id="modelUpload">

<input type="text" id="headlineInput" placeholder="Headline">
<input type="text" id="descInput" placeholder="Description">
<input type="text" id="quoteInput" placeholder="Quote">

<input type="text" id="phoneInput" placeholder="Phone">
<input type="text" id="websiteInput" placeholder="Website">

<select id="fontSelect">
<option value="Poppins">Poppins</option>
<option value="Montserrat">Montserrat</option>
</select>

<input type="color" id="colorPicker">

<button onclick="switchLayout()">Switch Layout</button>
<button onclick="downloadPoster()">Download PNG</button>

</div>

<div class="poster" id="poster">

<div class="bg-circle"></div>

<div class="logo">
<img id="logoImg">
</div>

<div class="text-area">

<div class="headline" id="headline">
Digital Marketing Agency
</div>

<div class="desc" id="desc">
Lorem ipsum dolor sit amet consectetur adipiscing elit
</div>

<div class="quote" id="quote">
"Find new opportunity with us"
</div>

</div>

<div class="model">
<img id="modelImg">
</div>

<div class="bottom-overlay"></div>

<div class="footer">

<div class="cta">LEARN MORE</div>

<div class="contact">
<div>More information call us</div>
<div id="phone">000 123 456 789</div>
<div id="website">www.website.com</div>
</div>

</div>

</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

const poster=document.getElementById("poster")

function switchLayout(){
poster.classList.toggle("reverse")
}

document.getElementById("headlineInput").oninput=e=>{
headline.innerText=e.target.value
}

document.getElementById("descInput").oninput=e=>{
desc.innerText=e.target.value
}

document.getElementById("quoteInput").oninput=e=>{
quote.innerText=e.target.value
}

document.getElementById("phoneInput").oninput=e=>{
phone.innerText=e.target.value
}

document.getElementById("websiteInput").oninput=e=>{
website.innerText=e.target.value
}

document.getElementById("fontSelect").onchange=e=>{
poster.style.fontFamily=e.target.value
}

document.getElementById("colorPicker").oninput=e=>{
headline.style.color=e.target.value
}

document.getElementById("logoUpload").onchange=e=>{
let reader=new FileReader()
reader.onload=function(ev){
logoImg.src=ev.target.result
}
reader.readAsDataURL(e.target.files[0])
}

document.getElementById("modelUpload").onchange=e=>{
let reader=new FileReader()
reader.onload=function(ev){
modelImg.src=ev.target.result
}
reader.readAsDataURL(e.target.files[0])
}

function downloadPoster(){
html2canvas(poster).then(canvas=>{
let link=document.createElement("a")
link.download="poster.png"
link.href=canvas.toDataURL()
link.click()
})
}

</script>

</body>
</html>
