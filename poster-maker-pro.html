<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro Poster Maker</title>

<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

.controls{
margin-bottom:20px;
}

input,select,button{
padding:8px;
margin:5px;
}

#poster{

width:1080px;
height:1080px;
position:relative;

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);

overflow:hidden;
}

.bgOverlay{
position:absolute;
width:100%;
height:100%;
background-size:cover;
opacity:.25;
}

.gradientFade{

position:absolute;
bottom:0;
width:100%;
height:50%;
background:linear-gradient(to top,#000000cc,transparent);

}

.logo{

position:absolute;
top:40px;
left:40px;
max-width:150px;

}

.headline{

position:absolute;
top:300px;
left:100px;

font-size:80px;
font-weight:bold;

background:#00000088;
padding:20px 30px;
border-radius:8px;

cursor:move;

}

.human{

position:absolute;
bottom:0;
right:80px;
max-height:900px;

cursor:move;

}

</style>
</head>

<body>

<h2>Pro Poster Generator</h2>

<div class="controls">

Logo
<input type="file" id="logoUpload">

Human Image
<input type="file" id="humanUpload">

Headline
<input type="text" id="headlineInput" value="Digital Marketing">

Background
<select id="bgSelect">
<option value="none">None</option>
<option value="https://images.unsplash.com/photo-1492724441997-5dc865305da7">City</option>
<option value="https://images.unsplash.com/photo-1492724724894-7464c27d0ceb">Office</option>
<option value="https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d">Work</option>
<option value="https://images.unsplash.com/photo-1460925895917-afdab827c52f">Tech</option>
<option value="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">Business</option>
</select>

<button onclick="download()">Download PNG</button>

</div>

<div id="poster">

<div class="bgOverlay" id="bg"></div>

<img id="logo" class="logo">

<div id="headline" class="headline">Digital Marketing</div>

<img id="human" class="human">

<div class="gradientFade"></div>

</div>


<script>

headlineInput.oninput=()=>{
headline.innerText=headlineInput.value
}

logoUpload.onchange=e=>{
logo.src=URL.createObjectURL(e.target.files[0])
}

humanUpload.onchange=e=>{
human.src=URL.createObjectURL(e.target.files[0])
}

bgSelect.onchange=()=>{
bg.style.backgroundImage=`url(${bgSelect.value})`
}

interact('.headline,.human').draggable({

listeners:{
move(event){

let target=event.target

let x=(parseFloat(target.getAttribute('data-x'))||0)+event.dx
let y=(parseFloat(target.getAttribute('data-y'))||0)+event.dy

target.style.transform=`translate(${x}px,${y}px)`

target.setAttribute('data-x',x)
target.setAttribute('data-y',y)

}
}

})

function download(){

html2canvas(document.querySelector("#poster")).then(canvas=>{

let link=document.createElement("a")
link.download="poster.png"
link.href=canvas.toDataURL()
link.click()

})

}

</script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</body>
</html>
