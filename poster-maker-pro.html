<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Poster Maker</title>

<style>

body{
font-family:sans-serif;
background:#111;
color:white;
text-align:center;
padding:20px;
}

.controls{
margin-bottom:20px;
}

input,select,button{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#ff4d4d;
color:white;
cursor:pointer;
}

#poster{
width:1080px;
height:1080px;
margin:auto;
position:relative;
background:#222;
overflow:hidden;
}

#posterText{
position:absolute;
top:200px;
left:200px;
font-size:60px;
font-weight:bold;
cursor:move;
}

#person{
position:absolute;
bottom:0;
left:100px;
height:500px;
cursor:move;
}

</style>
</head>

<body>

<h2>Pro Poster Generator</h2>

<div class="controls">

<input type="text" id="textInput" placeholder="Enter Headline">

<br>

<label>Background Preset</label>

<select onchange="setPreset(this.value)">

<option value="">Select</option>

<option value="#000000">Black</option>
<option value="#1e3c72">Blue</option>
<option value="#8e44ad">Purple</option>
<option value="#e74c3c">Red</option>
<option value="#16a085">Green</option>
<option value="#f39c12">Orange</option>
<option value="#2c3e50">Dark</option>
<option value="#34495e">Steel</option>
<option value="#7f8c8d">Grey</option>
<option value="#ffffff">White</option>

</select>

<button onclick="randomGradient()">Auto Gradient</button>

<br>

<label>Text Effect</label>

<select onchange="setTextEffect(this.value)">

<option value="none">None</option>
<option value="shadow">Shadow</option>
<option value="glow">Glow</option>

</select>

<br>

<input type="file" id="imgUpload">

<button onclick="downloadPoster()">Download Poster</button>

</div>

<div id="poster">

<div id="posterText">Headline</div>

<img id="person"/>

</div>

<script>

const posterText = document.getElementById("posterText")
const poster = document.getElementById("poster")
const person = document.getElementById("person")

document.getElementById("textInput").oninput = e=>{
posterText.innerText = e.target.value
}

document.getElementById("imgUpload").onchange = e=>{
person.src = URL.createObjectURL(e.target.files[0])
}

function setPreset(color){
poster.style.background = color
}

function randomGradient(){

let colors = [
"#ff416c","#ff4b2b",
"#00c6ff","#0072ff",
"#f7971e","#ffd200",
"#7F00FF","#E100FF",
"#00F260","#0575E6"
]

let c1 = colors[Math.floor(Math.random()*colors.length)]
let c2 = colors[Math.floor(Math.random()*colors.length)]

poster.style.background =
`linear-gradient(135deg,${c1},${c2})`
}

function setTextEffect(type){

if(type=="shadow"){
posterText.style.textShadow="4px 4px 10px black"
}

else if(type=="glow"){
posterText.style.textShadow="0 0 20px #fff"
}

else{
posterText.style.textShadow="none"
}

}

function dragElement(el){

let pos1=0,pos2=0,pos3=0,pos4=0

el.onmousedown = dragMouseDown

function dragMouseDown(e){

e.preventDefault()

pos3 = e.clientX
pos4 = e.clientY

document.onmouseup = closeDrag
document.onmousemove = elementDrag
}

function elementDrag(e){

e.preventDefault()

pos1 = pos3 - e.clientX
pos2 = pos4 - e.clientY
pos3 = e.clientX
pos4 = e.clientY

el.style.top = (el.offsetTop - pos2) + "px"
el.style.left = (el.offsetLeft - pos1) + "px"
}

function closeDrag(){

document.onmouseup=null
document.onmousemove=null

}

}

dragElement(posterText)
dragElement(person)

function downloadPoster(){

html2canvas(poster).then(canvas=>{
let link=document.createElement("a")
link.download="poster.png"
link.href=canvas.toDataURL()
link.click()
})

}

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</body>
</html>
