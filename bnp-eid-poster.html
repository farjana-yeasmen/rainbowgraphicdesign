<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BNP Eid Poster Tool - Advanced Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root { --primary: #28a745; --blue: #1e3a8a; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 800px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
        
        .controls { text-align: left; padding: 10px; background: #fafafa; border-radius: 10px; border: 1px solid #eee; }
        .control-group { margin-bottom: 15px; border-bottom: 1px dashed #ddd; padding-bottom: 10px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #333; }
        input[type="range"] { width: 100%; accent-color: var(--primary); }
        input[type="text"], input[type="file"] { width: 100%; padding: 8px; margin-bottom: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .preview-area { position: sticky; top: 20px; text-align: center; }
        canvas { width: 100%; height: auto; border-radius: 10px; border: 3px solid #ddd; background: #eee; }
        
        .img-container { width: 100%; max-height: 300px; margin-bottom: 10px; overflow: hidden; display: none; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-download { background: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <h3>এডিটিং প্যানেল</h3>
        
        <div class="control-group">
            <label>১. ছবি ও ক্রপিং</label>
            <input type="file" id="userImgInput" accept="image/*">
            <div class="img-container" id="cropperWrapper">
                <img id="image-to-crop">
            </div>
        </div>

        <div class="control-group">
            <label>২. নাম ও পদবী</label>
            <input type="text" id="nameInput" placeholder="নাম লিখুন" oninput="updatePoster()">
            <input type="text" id="titleInput" placeholder="পদবী ও এলাকা" oninput="updatePoster()">
        </div>

        <div class="control-group">
            <label>৩. ছবির পজিশন ও সাইজ</label>
            <label>সাইজ: <input type="range" id="imgSize" min="100" max="500" value="250" oninput="updatePoster()"></label>
            <label>ডানে-বামে: <input type="range" id="imgX" min="0" max="1080" value="195" oninput="updatePoster()"></label>
            <label>ওপর-নিচে: <input type="range" id="imgY" min="0" max="1350" value="1085" oninput="updatePoster()"></label>
        </div>

        <div class="control-group">
            <label>৪. লেখার পজিশন ও সাইজ</label>
            <label>ফন্ট সাইজ: <input type="range" id="fontSize" min="20" max="80" value="42" oninput="updatePoster()"></label>
            <label>ডানে-বামে: <input type="range" id="textX" min="0" max="1080" value="420" oninput="updatePoster()"></label>
            <label>ওপর-নিচে: <input type="range" id="textY" min="0" max="1350" value="1055" oninput="updatePoster()"></label>
        </div>

        <button class="btn-download" onclick="downloadImage()">গ্যালারিতে সেভ করুন</button>
    </div>

    <div class="preview-area">
        <canvas id="posterCanvas" width="1080" height="1350"></canvas>
        <p style="font-size: 12px; color: #666;">* প্রিভিউ দেখে স্লাইডার দিয়ে অ্যাডজাস্ট করুন</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
    const canvas = document.getElementById('posterCanvas');
    const ctx = canvas.getContext('2d');
    const imageInput = document.getElementById('userImgInput');
    const imageToCrop = document.getElementById('image-to-crop');
    const cropperWrapper = document.getElementById('cropperWrapper');
    let cropper;
    let croppedImgData = null;

    const bgImage = new Image();
    bgImage.src = 'bnp-eid-bg.jpeg'; 
    bgImage.onload = () => updatePoster();

    // ছবি সিলেক্ট এবং ক্রপ
    imageInput.addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            imageToCrop.src = event.target.result;
            cropperWrapper.style.display = 'block';
            if (cropper) cropper.destroy();
            cropper = new Cropper(imageToCrop, {
                aspectRatio: 1,
                viewMode: 1,
                cropend() {
                    croppedImgData = cropper.getCroppedCanvas().toDataURL();
                    updatePoster();
                }
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function updatePoster() {
        // ১. ব্যাকগ্রাউন্ড ড্র করা
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

        // ২. ইউজার ছবি ড্র করা (যদি থাকে)
        if (croppedImgData) {
            const userImg = new Image();
            userImg.onload = function() {
                const size = parseInt(document.getElementById('imgSize').value);
                const x = parseInt(document.getElementById('imgX').value);
                const y = parseInt(document.getElementById('imgY').value);

                ctx.save();
                ctx.beginPath();
                ctx.arc(x, y, size / 2, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(userImg, x - size/2, y - size/2, size, size);
                ctx.restore();
                drawText(); // ছবি লোড হওয়ার পর টেক্সট ড্র হবে
            };
            userImg.src = croppedImgData;
        } else {
            drawText();
        }
    }

    function drawText() {
        const name = document.getElementById('nameInput').value || "আপনার নাম";
        const title = document.getElementById('titleInput').value || "";
        const fSize = parseInt(document.getElementById('fontSize').value);
        const tx = parseInt(document.getElementById('textX').value);
        const ty = parseInt(document.getElementById('textY').value);

        ctx.fillStyle = "white";
        ctx.textAlign = "left";
        
        // নাম
        ctx.font = `bold ${fSize}px Arial`;
        ctx.fillText(name, tx, ty);

        // পদবী (নামের নিচে কিছুটা গ্যাপ রেখে)
        ctx.font = `${fSize * 0.7}px Arial`;
        ctx.fillText(title, tx, ty + (fSize * 1.2));
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'BNP-Eid-Poster.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    }
</script>

</body>
</html>
