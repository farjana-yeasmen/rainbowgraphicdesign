<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eid Poster Generator Pro</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}
.container{
    max-width:1000px;
    margin:auto;
}
.controls{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}
input, select{
    width:100%;
    margin-bottom:12px;
}
canvas{
    max-width:100%;
    border-radius:12px;
    cursor:grab;
}
button{
    padding:12px 25px;
    background:#0a7c4a;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Eid Poster Generator Pro</h2>

<div class="controls">

<input type="file" id="photo">

<input type="text" id="name" placeholder="Enter Name">
<input type="text" id="designation" placeholder="Enter Designation">

<label>Name Y Position</label>
<input type="range" id="nameY" min="200" max="1000" value="650">

<label>Name Font Size</label>
<input type="range" id="nameSize" min="20" max="100" value="60">

<label>Designation Y Position</label>
<input type="range" id="desigY" min="200" max="1100" value="730">

<label>Designation Font Size</label>
<input type="range" id="desigSize" min="15" max="60" value="30">

<label>Photo Size</label>
<input type="range" id="photoSize" min="100" max="600" value="300">

<label>Photo Shape</label>
<select id="photoShape">
<option value="circle">Circle</option>
<option value="square">Square</option>
</select>

<button onclick="downloadPoster()">Download Poster</button>

</div>

<canvas id="canvas"></canvas>
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const template = new Image();
template.src = "eid-template.jpg";

let userImage = new Image();

let photoX = 350;
let photoY = 200;
let dragging = false;

document.getElementById("photo").addEventListener("change", function(e){
    const reader = new FileReader();
    reader.onload = function(event){
        userImage.src = event.target.result;
        drawPoster();
    }
    reader.readAsDataURL(e.target.files[0]);
});

document.querySelectorAll("input, select").forEach(el=>{
    el.addEventListener("input", drawPoster);
});

function autoFit(text, maxWidth, size){
    while(size > 10){
        ctx.font = "bold " + size + "px Arial";
        if(ctx.measureText(text).width <= maxWidth){
            return size;
        }
        size--;
    }
    return size;
}

function drawPoster(){

    canvas.width = template.width;
    canvas.height = template.height;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(template,0,0);

    const photoSize = parseInt(document.getElementById("photoSize").value);
    const shape = document.getElementById("photoShape").value;

    if(userImage.src){

        ctx.save();

        if(shape === "circle"){
            ctx.beginPath();
            ctx.arc(photoX + photoSize/2, photoY + photoSize/2, photoSize/2, 0, Math.PI*2);
            ctx.closePath();
            ctx.clip();
        }

        ctx.shadowColor="black";
        ctx.shadowBlur=20;

        ctx.drawImage(userImage, photoX, photoY, photoSize, photoSize);

        ctx.restore();
    }

    ctx.fillStyle="white";
    ctx.textAlign="center";

    const name = document.getElementById("name").value;
    const designation = document.getElementById("designation").value;

    let nameSize = parseInt(document.getElementById("nameSize").value);
    let nameY = parseInt(document.getElementById("nameY").value);

    nameSize = autoFit(name, 900, nameSize);

    ctx.font="bold "+nameSize+"px Arial";
    ctx.fillText(name, canvas.width/2, nameY);

    let desigSize = parseInt(document.getElementById("desigSize").value);
    let desigY = parseInt(document.getElementById("desigY").value);

    ctx.font=desigSize+"px Arial";
    ctx.fillText(designation, canvas.width/2, desigY);
}

template.onload = drawPoster;

canvas.addEventListener("mousedown", function(e){
    dragging = true;
});

canvas.addEventListener("mouseup", function(){
    dragging = false;
});

canvas.addEventListener("mousemove", function(e){
    if(dragging){
        const rect = canvas.getBoundingClientRect();
        photoX = e.clientX - rect.left - 150;
        photoY = e.clientY - rect.top - 150;
        drawPoster();
    }
});

function downloadPoster(){
    const link=document.createElement("a");
    link.download="eid-poster.png";
    link.href=canvas.toDataURL("image/png",1.0);
    link.click();
}

</script>

</body>
</html>
