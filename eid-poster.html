<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Poster Generator</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    margin:0;
    padding:10px;
    text-align:center;
}

.container{
    max-width:500px;
    margin:auto;
}

.logo{
    width:120px;
    margin:10px auto;
}

.controls{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

input, select{
    width:100%;
    margin-bottom:10px;
}

canvas{
    width:100%;
    border-radius:12px;
}

button{
    width:100%;
    padding:12px;
    background:#0a7c4a;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="controls">

<input type="file" id="photo">

<input type="text" id="name" placeholder="Enter Name">
<input type="text" id="designation" placeholder="Enter Designation">

<label>Text Color</label>
<select id="textColor">
<option value="white">White</option>
<option value="black">Black</option>
<option value="#FFD700">Gold</option>
<option value="#00FFFF">Cyan</option>
</select>

<label>Name Y Position</label>
<input type="range" id="nameY" min="200" max="1200" value="750">

<label>Designation Y Position</label>
<input type="range" id="desigY" min="200" max="1300" value="830">

<label>Photo X Position</label>
<input type="range" id="photoX" min="0" max="800" value="200">

<label>Photo Y Position</label>
<input type="range" id="photoY" min="0" max="1000" value="250">

<label>Photo Size</label>
<input type="range" id="photoSize" min="100" max="500" value="250">

<button onclick="downloadPoster()">Download Poster</button>

</div>

<canvas id="canvas"></canvas>

</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const template = new Image();
template.src = "eid-template.jpg";

let userImage = new Image();

document.getElementById("photo").addEventListener("change", function(e){
    const reader = new FileReader();
    reader.onload = function(event){
        userImage.src = event.target.result;
        drawPoster();
    }
    reader.readAsDataURL(e.target.files[0]);
});

document.querySelectorAll("input, select").forEach(el=>{
    el.addEventListener("input", drawPoster);
});

function autoFit(text, maxWidth, size){
    while(size > 10){
        ctx.font = "bold " + size + "px Arial";
        if(ctx.measureText(text).width <= maxWidth){
            return size;
        }
        size--;
    }
    return size;
}

function drawPoster(){

    canvas.width = 800;
    canvas.height = 1400;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(template,0,0,canvas.width,canvas.height);

    const photoX = parseInt(document.getElementById("photoX").value);
    const photoY = parseInt(document.getElementById("photoY").value);
    const photoSize = parseInt(document.getElementById("photoSize").value);

    if(userImage.src){
        ctx.save();
        ctx.beginPath();
        ctx.arc(photoX + photoSize/2, photoY + photoSize/2, photoSize/2, 0, Math.PI*2);
        ctx.closePath();
        ctx.clip();

        ctx.drawImage(userImage, photoX, photoY, photoSize, photoSize);
        ctx.restore();
    }

    const color = document.getElementById("textColor").value;
    ctx.fillStyle = color;
    ctx.textAlign = "center";

    const name = document.getElementById("name").value;
    const designation = document.getElementById("designation").value;

    let nameSize = autoFit(name, 700, 60);
    ctx.font="bold "+nameSize+"px Arial";
    ctx.fillText(name, canvas.width/2, document.getElementById("nameY").value);

    ctx.font="30px Arial";
    ctx.fillText(designation, canvas.width/2, document.getElementById("desigY").value);

    ctx.font="25px Arial";
    ctx.fillText("Thank You & Eid Mubarak", canvas.width/2, photoY + photoSize + 60);
}

template.onload = drawPoster;

function downloadPoster(){
    const link=document.createElement("a");
    link.download="eid-poster.png";
    link.href=canvas.toDataURL("image/png",1.0);
    link.click();
}

</script>

</body>
</html>
