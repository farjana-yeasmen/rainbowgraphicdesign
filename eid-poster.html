<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Poster Generator</title>
<style>
body{font-family:'Poppins',sans-serif;text-align:center;background:#f8fafc;}
canvas{border:1px solid #ddd;margin-top:20px;border-radius:10px;}
input,button{padding:10px;margin:10px;border-radius:6px;}
button{background:#e11d48;color:white;border:none;cursor:pointer;}
</style>
</head>
<body>

<h1>Eid Poster Generator</h1>

<input type="file" id="photoInput" accept="image/*"><br>
<input type="text" id="nameInput" placeholder="Enter Name"><br>
<input type="text" id="designationInput" placeholder="Enter Designation"><br>
<button onclick="generatePoster()">Generate</button>
<button onclick="downloadPoster()">Download JPEG</button><br>

<canvas id="posterCanvas" width="1080" height="1080"></canvas>

<script>
const canvas = document.getElementById("posterCanvas");
const ctx = canvas.getContext("2d");
let generated = false;

const defaultImage = new Image();
defaultImage.src = "eid-default.jpg";
defaultImage.onload = function(){ ctx.drawImage(defaultImage,0,0,1080,1080); };

function generatePoster(){
  const file = document.getElementById("photoInput").files[0];
  const name = document.getElementById("nameInput").value.trim();
  const designation = document.getElementById("designationInput").value.trim();
  if(!file || !name || !designation){ alert("Please fill all fields"); return; }

  const reader = new FileReader();
  reader.onload = function(e){
    const userImg = new Image();
    userImg.onload = function(){
      const template = new Image();
      template.src = "eid-template.jpg";
      template.onload = function(){
        ctx.clearRect(0,0,1080,1080);
        ctx.drawImage(template,0,0,1080,1080);

        // Crop user image to square
        let size = Math.min(userImg.width,userImg.height);
        let sx = (userImg.width - size)/2;
        let sy = (userImg.height - size)/2;
        let imageX=120,imageY=520,imageSize=420;

        ctx.save();
        ctx.beginPath();
        ctx.arc(imageX+imageSize/2,imageY+imageSize/2,imageSize/2,0,Math.PI*2);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(userImg,sx,sy,size,size,imageX,imageY,imageSize,imageSize);
        ctx.restore();

        ctx.textAlign="left";
        ctx.fillStyle="black";
        ctx.strokeStyle="white";
        ctx.lineWidth=8;

        let fontSize=65;
        ctx.font="bold "+fontSize+"px Arial";
        while(ctx.measureText(name).width>400){ fontSize-=2; ctx.font="bold "+fontSize+"px Arial"; }

        let nameX=600,nameY=880,designationY=940;
        ctx.strokeText(name,nameX,nameY); ctx.fillText(name,nameX,nameY);
        ctx.font="45px Arial"; ctx.strokeText(designation,nameX,designationY); ctx.fillText(designation,nameX,designationY);

        generated=true;
      }
    }
    userImg.src=e.target.result;
  }
  reader.readAsDataURL(file);
}

function downloadPoster(){
  if(!generated){ alert("Please generate first"); return; }
  const link=document.createElement("a");
  link.download="eid-poster.jpg";
  link.href=canvas.toDataURL("image/jpeg",1.0);
  link.click();
}
</script>

</body>
</html>
