<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Poster Generator</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f4f4;
}

.container{
    max-width:480px;
    margin:auto;
    padding:15px;
}

.logo{
    width:110px;
    display:block;
    margin:10px auto 20px;
}

.controls{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

input, select{
    width:100%;
    margin-bottom:10px;
}

label{
    font-size:14px;
    display:block;
    margin-bottom:4px;
}

button{
    width:100%;
    padding:12px;
    background:#0a7c4a;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

canvas{
    width:100%;
    height:auto;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="controls">

<input type="file" id="photo">

<input type="text" id="name" placeholder="Enter Name">
<input type="text" id="designation" placeholder="Enter Designation">

<label>Text Color</label>
<select id="textColor">
<option value="white">White</option>
<option value="black">Black</option>
<option value="#FFD700">Gold</option>
<option value="#0a7c4a">Green</option>
</select>

<label>Name Position (Up / Down)</label>
<input type="range" id="nameY" min="0" max="1080" value="750">

<label>Designation Position (Up / Down)</label>
<input type="range" id="desigY" min="0" max="1080" value="900">

<label>Photo X Position</label>
<input type="range" id="photoX" min="0" max="1080" value="300">

<label>Photo Y Position</label>
<input type="range" id="photoY" min="0" max="1080" value="250">

<label>Photo Size</label>
<input type="range" id="photoSize" min="100" max="600" value="350">

<button onclick="downloadPoster()">Download Poster</button>

</div>

<canvas id="canvas"></canvas>

</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const template = new Image();
template.src = "eid-template.jpg";

let userImage = new Image();

document.getElementById("photo").addEventListener("change", function(e){
    const reader = new FileReader();
    reader.onload = function(event){
        userImage.src = event.target.result;
        drawPoster();
    }
    reader.readAsDataURL(e.target.files[0]);
});

document.querySelectorAll("input, select").forEach(el=>{
    el.addEventListener("input", drawPoster);
});

function autoFit(text, maxWidth, size){
    while(size > 10){
        ctx.font = "bold " + size + "px Arial";
        if(ctx.measureText(text).width <= maxWidth){
            return size;
        }
        size--;
    }
    return size;
}

function drawPoster(){

    canvas.width = template.width;
    canvas.height = template.height;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(template,0,0);

    const photoX = parseInt(document.getElementById("photoX").value);
    const photoY = parseInt(document.getElementById("photoY").value);
    const photoSize = parseInt(document.getElementById("photoSize").value);

    if(userImage.src){
        ctx.save();
        ctx.beginPath();
        ctx.arc(photoX + photoSize/2, photoY + photoSize/2, photoSize/2, 0, Math.PI*2);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(userImage, photoX, photoY, photoSize, photoSize);
        ctx.restore();
    }

    const color = document.getElementById("textColor").value;
    ctx.fillStyle = color;
    ctx.textAlign = "center";

    const name = document.getElementById("name").value;
    const designation = document.getElementById("designation").value;

    let nameSize = autoFit(name, 900, 60);
    let nameY = parseInt(document.getElementById("nameY").value);

    ctx.font = "bold " + nameSize + "px Arial";
    ctx.fillText(name, canvas.width/2, nameY);

    let desigY = parseInt(document.getElementById("desigY").value);
    ctx.font = "30px Arial";
    ctx.fillText(designation, canvas.width/2, desigY);
}

template.onload = drawPoster;

function downloadPoster(){
    const link = document.createElement("a");
    link.download = "eid-poster.png";
    link.href = canvas.toDataURL("image/png",1.0);
    link.click();
}

</script>

</body>
</html>
