<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Card Maker Pro Max</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
--primary:#c40000;
--green:#1fa34a;
--dark:#111;
--light:#ffffff;
}

body{
margin:0;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans Bengali",sans-serif;
background:#f2f2f2;
}

.dark-mode{
background:#121212;
color:#fff;
}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:20px;
}

.controls{
flex:1;
min-width:320px;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
max-height:95vh;
overflow:auto;
}

.dark-mode .controls{
background:#1e1e1e;
}

.controls h3{
margin-top:25px;
}

.controls input,
.controls textarea,
.controls select{
width:100%;
margin-top:8px;
margin-bottom:12px;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.controls button{
padding:10px;
background:var(--primary);
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:5px;
width:100%;
}

.toggle-btn{
background:#333;
margin-bottom:10px;
}

.preview-wrapper{
flex:1;
display:flex;
justify-content:center;
}

#card{
width:540px;
height:540px;
background:#fff;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,.2);
overflow:hidden;
}

.main-img{
width:100%;
height:60%;
object-fit:cover;
}

.headline-bar{
background:linear-gradient(to bottom,#e00000,#8b0000);
color:#fff;
padding:20px;
position:relative;
cursor:move;
}

.headline{
font-size:24px;
font-weight:bold;
line-height:1.3;
position:relative;
}

.date{
position:absolute;
right:15px;
bottom:15px;
background:#5a0000;
padding:5px 10px;
border-radius:5px;
font-size:12px;
}

.social-bar{
background:#a00000;
color:#fff;
display:flex;
flex-wrap:wrap;
gap:15px;
padding:10px 20px;
}

.social-item{
display:flex;
align-items:center;
gap:6px;
font-size:14px;
}

.ad-section{
display:flex;
height:25%;
}

.ad-left{
flex:1;
background:#000;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:10px;
}

.ad-middle{
flex:2;
background:#d10000;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:10px;
font-weight:bold;
}

.ad-right{
flex:1;
display:flex;
flex-direction:column;
}

.ad-green{
background:var(--green);
color:#fff;
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.ad-img{
flex:1;
width:100%;
object-fit:cover;
}
</style>
</head>

<body>

<div class="container">

<div class="controls">

<button class="toggle-btn" onclick="toggleDark()">Toggle Dark Mode</button>

<h3>মূল সেকশন</h3>
<input type="file" id="mainImage">
<textarea id="headlineInput" placeholder="শিরোনাম লিখুন"></textarea>
<input type="text" id="dateInput" placeholder="তারিখ">
<label>Font Size</label>
<input type="range" min="18" max="60" value="24" id="fontSize">
<label>Text Color</label>
<input type="color" id="textColor" value="#ffffff">

<h3>সোশ্যাল মিডিয়া</h3>
<div id="socialInputs"></div>
<button onclick="addSocial()">+ Add Social</button>

<h3>বিজ্ঞাপন</h3>
<textarea id="adLeftInput" placeholder="বামের ব্লকের লেখা"></textarea>
<textarea id="adMiddleInput" placeholder="মাঝখানের লাল স্লোগান"></textarea>
<input type="text" id="adGreenInput" placeholder="সবুজ বক্স লেখা">
<input type="file" id="adImageInput">

<h3>Section Toggle</h3>
<label><input type="checkbox" checked onchange="toggleSection('social-bar')"> Social Bar</label>
<label><input type="checkbox" checked onchange="toggleSection('ad-section')"> Ad Section</label>

<button onclick="downloadJPEG()">Download JPEG</button>
<button onclick="downloadPNG()">Download PNG</button>

</div>

<div class="preview-wrapper">
<div id="card">

<img src="https://picsum.photos/1080" class="main-img" id="mainPreview">

<div class="headline-bar" id="dragArea">
<div class="headline" id="headlinePreview">এখানে শিরোনাম আসবে</div>
<div class="date" id="datePreview">তারিখ</div>
</div>

<div class="social-bar" id="socialPreview"></div>

<div class="ad-section">
<div class="ad-left" id="adLeftPreview">বামের বিজ্ঞাপন</div>
<div class="ad-middle" id="adMiddlePreview">মাঝখানের স্লোগান</div>
<div class="ad-right">
<div class="ad-green" id="adGreenPreview">১০% ছাড়</div>
<img src="https://picsum.photos/200" class="ad-img" id="adImgPreview">
</div>
</div>

</div>
</div>

</div>

<script>
function toggleDark(){
document.body.classList.toggle("dark-mode");
}

function toggleSection(className){
document.querySelector("."+className).style.display =
document.querySelector("."+className).style.display === "none" ? "flex" : "none";
}

mainImage.onchange = e=>{
const reader=new FileReader();
reader.onload=()=>mainPreview.src=reader.result;
reader.readAsDataURL(e.target.files[0]);
}

adImageInput.onchange = e=>{
const reader=new FileReader();
reader.onload=()=>adImgPreview.src=reader.result;
reader.readAsDataURL(e.target.files[0]);
}

headlineInput.oninput=()=>headlinePreview.innerText=headlineInput.value;
dateInput.oninput=()=>datePreview.innerText=dateInput.value;
adLeftInput.oninput=()=>adLeftPreview.innerText=adLeftInput.value;
adMiddleInput.oninput=()=>adMiddlePreview.innerText=adMiddleInput.value;
adGreenInput.oninput=()=>adGreenPreview.innerText=adGreenInput.value;

fontSize.oninput=()=>headlinePreview.style.fontSize=fontSize.value+"px";
textColor.oninput=()=>headlinePreview.style.color=textColor.value;

function addSocial(){
const div=document.createElement("div");
div.innerHTML=`
<select>
<option value="fa-youtube">YouTube</option>
<option value="fa-facebook">Facebook</option>
<option value="fa-globe">Website</option>
<option value="fa-instagram">Instagram</option>
<option value="fa-twitter">Twitter</option>
</select>
<input type="text" placeholder="নাম">
<button onclick="this.parentElement.remove();updateSocial()">Remove</button>
`;
socialInputs.appendChild(div);
div.querySelector("select").onchange=updateSocial;
div.querySelector("input").oninput=updateSocial;
}

function updateSocial(){
socialPreview.innerHTML="";
document.querySelectorAll("#socialInputs div").forEach(d=>{
let icon=d.querySelector("select").value;
let text=d.querySelector("input").value;
if(text.trim()!==""){
socialPreview.innerHTML+=`<div class="social-item"><i class="fa ${icon}"></i> ${text}</div>`;
}
});
}

function downloadJPEG(){
html2canvas(card,{scale:2}).then(canvas=>{
let link=document.createElement("a");
link.download="news-card.jpg";
link.href=canvas.toDataURL("image/jpeg",1);
link.click();
});
}

function downloadPNG(){
html2canvas(card,{scale:2,backgroundColor:null}).then(canvas=>{
let link=document.createElement("a");
link.download="news-card.png";
link.href=canvas.toDataURL("image/png");
link.click();
});
}

/* Drag headline */
let isDragging=false,offsetY;
dragArea.addEventListener("mousedown",e=>{
isDragging=true;
offsetY=e.offsetY;
});
document.addEventListener("mouseup",()=>isDragging=false);
document.addEventListener("mousemove",e=>{
if(isDragging){
dragArea.style.top=(e.clientY-offsetY)+"px";
dragArea.style.position="absolute";
}
});
</script>

</body>
</html>
